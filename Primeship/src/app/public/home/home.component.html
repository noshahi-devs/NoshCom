    <!-- Skygarden-Style Hero Stage -->
    <section class="home-hero-stage">
        <div class="hero-carousel-wrapper" tabindex="0" (keydown)="onHeroKey($event)">
            <div class="hero-slide" *ngFor="let slide of heroSlides; let i = index" 
                 [class.active]="i === heroIndex">
                <video
                    *ngIf="slide.video; else heroImage"
                    class="hero-bg-video"
                    [attr.poster]="slide.poster || slide.image || null"
                    autoplay
                    muted
                    loop
                    playsinline
                    preload="metadata"
                >
                    <source [src]="slide.video" type="video/mp4" />
                </video>
                <ng-template #heroImage>
                    <img [src]="slide.image" alt="Hero Background" class="hero-bg-img">
                </ng-template>
            </div>
            
            <!-- Navigation Arrows -->
            <button type="button" class="carousel-nav prev" (click)="prevHero()" aria-label="Previous Slide">
                <span class="carousel-nav-ico" aria-hidden="true">
                    <svg focusable="false" viewBox="2 2 24 24" aria-hidden="true">
                        <path
                            d="M21.46 14.19a.5.5 0 000-.38.36.36 0 00-.11-.16l-6-6a.49.49 0 00-.7.7l5.14 5.15H7a.5.5 0 000 1h12.79l-5.14 5.15a.48.48 0 000 .7.48.48 0 00.7 0l6-6a.36.36 0 00.11-.16z"
                        ></path>
                    </svg>
                </span>
            </button>
            <button type="button" class="carousel-nav next" (click)="nextHero()" aria-label="Next Slide">
                <span class="carousel-nav-ico" aria-hidden="true">
                    <svg focusable="false" viewBox="2 2 24 24" aria-hidden="true">
                        <path
                            d="M21.46 14.19a.5.5 0 000-.38.36.36 0 00-.11-.16l-6-6a.49.49 0 00-.7.7l5.14 5.15H7a.5.5 0 000 1h12.79l-5.14 5.15a.48.48 0 000 .7.48.48 0 00.7 0l6-6a.36.36 0 00.11-.16z"
                        ></path>
                    </svg>
                </span>
            </button>

            <!-- Minimal Dot Pagination -->
            <div class="hero-dots">
                <span class="dot" *ngFor="let s of heroSlides; let i = index" 
                      [class.active]="i === heroIndex" 
                      (click)="goHero(i)"></span>
            </div>
        </div>
    </section>

    <!-- Wayfair-style 3-up panels -->
    <section class="wf-home-panels" *ngIf="!isLoadingDeals && (wfKeepShoppingProducts.length || wfDealsProducts.length || wfVerifiedProducts.length)">
        <div class="container">
            <div class="wf-panel-grid">
                <div class="wf-panel">
                    <a class="wf-panel-head" [routerLink]="['/shop']" [queryParams]="{ q: keepShoppingQuery }">
                        <h2 class="wf-panel-h2">
                            keep shopping for {{ keepShoppingQuery }}
                            <svg focusable="false" viewBox="2 2 24 24" aria-hidden="true" class="wf-panel-arrow-ico">
                                <path d="M21.46 14.19a.5.5 0 000-.38.36.36 0 00-.11-.16l-6-6a.49.49 0 00-.7.7l5.14 5.15H7a.5.5 0 000 1h12.79l-5.14 5.15a.48.48 0 000 .7.48.48 0 00.7 0l6-6a.36.36 0 00.11-.16z"></path>
                            </svg>
                        </h2>
                    </a>
                    <div class="wf-panel-cards">
                        <div class="wf-mini-card" *ngFor="let p of wfKeepShoppingProducts; let i = index" (click)="goToProduct(p)">
                            <div class="wf-card-media">
                                <img [src]="p.image" [alt]="p.name" (error)="setDefaultImage($event)" />
                            </div>
                            <span class="wf-verified-badge" aria-hidden="true"><i class="fas fa-shield-alt"></i></span>
                            <button type="button" class="wf-heart" (click)="toggleWishlist(p, $event)" aria-label="Add to wishlist">
                                <i [class]="isInWishlist(p) ? 'fas fa-heart' : 'far fa-heart'"></i>
                            </button>
                            <span class="wf-mini-tag">{{ getWfTag('keep', i) }}</span>
                        </div>
                    </div>
                </div>

                <div class="wf-panel">
                    <a class="wf-panel-head" [routerLink]="['/shop']" [queryParams]="{ sortBy: 'discount' }">
                        <h2 class="wf-panel-h2">
                            up to 70% OFF: 5 Days of Deals
                            <svg focusable="false" viewBox="2 2 24 24" aria-hidden="true" class="wf-panel-arrow-ico">
                                <path d="M21.46 14.19a.5.5 0 000-.38.36.36 0 00-.11-.16l-6-6a.49.49 0 00-.7.7l5.14 5.15H7a.5.5 0 000 1h12.79l-5.14 5.15a.48.48 0 000 .7.48.48 0 00.7 0l6-6a.36.36 0 00.11-.16z"></path>
                            </svg>
                        </h2>
                    </a>
                    <div class="wf-panel-cards">
                        <div class="wf-mini-card" *ngFor="let p of wfDealsProducts; let i = index" (click)="goToProduct(p)">
                            <div class="wf-card-media">
                                <img [src]="p.image" [alt]="p.name" (error)="setDefaultImage($event)" />
                            </div>
                            <span class="wf-verified-badge" aria-hidden="true"><i class="fas fa-shield-alt"></i></span>
                            <button type="button" class="wf-heart" (click)="toggleWishlist(p, $event)" aria-label="Add to wishlist">
                                <i [class]="isInWishlist(p) ? 'fas fa-heart' : 'far fa-heart'"></i>
                            </button>
                            <span class="wf-mini-tag">{{ getWfTag('deals', i) }}</span>
                        </div>
                    </div>
                </div>

                <div class="wf-panel">
                    <a class="wf-panel-head" routerLink="/verified">
                        <h2 class="wf-panel-h2">
                            Verified items for you
                            <span class="wf-info" aria-hidden="true"><i class="fas fa-info-circle"></i></span>
                            <svg focusable="false" viewBox="2 2 24 24" aria-hidden="true" class="wf-panel-arrow-ico">
                                <path d="M21.46 14.19a.5.5 0 000-.38.36.36 0 00-.11-.16l-6-6a.49.49 0 00-.7.7l5.14 5.15H7a.5.5 0 000 1h12.79l-5.14 5.15a.48.48 0 000 .7.48.48 0 00.7 0l6-6a.36.36 0 00.11-.16z"></path>
                            </svg>
                        </h2>
                    </a>
                    <div class="wf-panel-cards">
                        <div class="wf-mini-card" *ngFor="let p of wfVerifiedProducts; let i = index" (click)="goToProduct(p)">
                            <div class="wf-card-media">
                                <img [src]="p.image" [alt]="p.name" (error)="setDefaultImage($event)" />
                            </div>
                            <span class="wf-verified-badge" aria-hidden="true"><i class="fas fa-shield-alt"></i></span>
                            <button type="button" class="wf-heart" (click)="toggleWishlist(p, $event)" aria-label="Add to wishlist">
                                <i [class]="isInWishlist(p) ? 'fas fa-heart' : 'far fa-heart'"></i>
                            </button>
                            <span class="wf-mini-tag">{{ getWfTag('verified', i) }}</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- All Products -->
    <section class="home-all-products" *ngIf="!isLoadingDeals && allProducts.length > 0">
        <div class="container">
            <h2 class="section-title">All Products</h2>
            
             <div class="deals-grid">
                 <div class="deal-card" *ngFor="let p of allProducts" (click)="goToProduct(p)">
                     <button type="button" class="deal-heart" (click)="toggleWishlist(p, $event)" aria-label="Save item">
                         <i [class]="isInWishlist(p) ? 'fas fa-heart' : 'far fa-heart'"></i>
                     </button>
                     <div class="card-media">
                        <img [src]="p.image" [alt]="p.name" (error)="setDefaultImage($event)">
                    </div>
                    <div class="card-body">
                        <h3>{{ p.name }}</h3>
                        <div class="price-row">
                            <span class="sale-price">{{ p.price | currency:'USD':'symbol':'1.0-0' }}</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
