<div class="auth-container">
  <div class="container d-flex align-items-center justify-content-center">
    <div class="auth-card">
      <div class="auth-header">
        <a routerLink="/" class="brand-logo">Prime<span>ship</span></a>
        <h2>Recovery Console</h2>
        <p>Enter your business email to reset your security key</p>
      </div>

      <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email">Business Email</label>
          <input type="email" id="email" class="form-control" formControlName="email"
            placeholder="name@company.com">
          <div class="error-message" *ngIf="forgotPasswordForm.get('email')?.invalid && forgotPasswordForm.get('email')?.touched"
               style="color: #EF4444; font-size: 12px; font-weight: 700; margin-top: 8px;">
            <i class="fas fa-exclamation-circle me-1"></i> Valid email is required for recovery
          </div>
        </div>

        <button type="submit" class="btn-primary" [disabled]="forgotPasswordForm.invalid || isLoading">
          <span *ngIf="!isLoading">Send Recovery Security Link</span>
          <i class="fas fa-spinner fa-spin" *ngIf="isLoading"></i>
          <i class="fas fa-paper-plane" *ngIf="!isLoading"></i>
        </button>
      </form>

      <div class="auth-footer">
        <p>Remembered your key? <a routerLink="/auth/login">Return to Dashboard</a></p>
      </div>
    </div>
  </div>
</div>
