<div class="auth-full-page register-full">
  <div class="auth-image-panel" aria-hidden="true"></div>

  <div class="auth-form-panel">
    <div class="form-panel-inner">
      <div class="auth-form-header">
        <div class="welcome-icon"><i class="fas fa-rocket"></i></div>
        <h2>Create Account</h2>
        <p>Join millions of global buyers</p>
      </div>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form compact-form">
        <div class="form-row-grid">
          <div class="field-group">
            <label><i class="fas fa-user"></i> Full Name</label>
            <input type="text" class="nosh-input" formControlName="name" placeholder="Your Name">
            <div class="field-error" *ngIf="registerForm.get('fullName')?.invalid && registerForm.get('fullName')?.touched">
              <i class="fas fa-exclamation-circle"></i> Required
            </div>
          </div>
          <div class="field-group">
            <label><i class="fas fa-phone"></i> Phone</label>
            <input type="tel" class="nosh-input" formControlName="phone" placeholder="+1 000 000 0000">
          </div>
        </div>

        <div class="field-group">
          <label><i class="fas fa-envelope"></i> Email</label>
          <input type="email" class="nosh-input" formControlName="email" placeholder="name@company.com">
          <div class="field-error" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
            <i class="fas fa-exclamation-circle"></i> Valid email required
          </div>
        </div>

        <div class="form-row-grid">
          <div class="field-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <div class="input-with-icon">
              <input [type]="showPassword ? 'text' : 'password'" class="nosh-input" formControlName="password" placeholder="••••••••">
              <button type="button" class="toggle-eye" (click)="togglePasswordVisibility()">
                <i class="fas" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
              </button>
            </div>
            <div class="field-error" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
              <i class="fas fa-exclamation-circle"></i> Min 6 chars
            </div>
          </div>
          <div class="field-group">
            <label><i class="fas fa-lock"></i> Confirm</label>
            <input [type]="showPassword ? 'text' : 'password'" class="nosh-input" formControlName="confirmPassword" placeholder="••••••••">
          </div>
        </div>

        <div class="field-group">
          <label><i class="fas fa-globe"></i> Country</label>
          <input type="text" class="nosh-input" formControlName="country" placeholder="United States">
        </div>

        <div class="terms-row">
          <label class="checkbox-label">
            <input type="checkbox" formControlName="agreeTerms">
            I agree to <a href="#">Terms</a> &amp; <a href="#">Privacy Policy</a>
          </label>
        </div>

        <button type="submit" class="nosh-btn-primary" [disabled]="registerForm.invalid || isLoading">
          <span *ngIf="!isLoading">Create Account</span>
          <i class="fas fa-spinner fa-spin" *ngIf="isLoading"></i>
          <i class="fas fa-arrow-right" *ngIf="!isLoading"></i>
        </button>
      </form>

      <div class="auth-divider"><span>Have an account?</span></div>
      <div class="auth-form-footer">
        <p>Already registered? <a routerLink="/auth/login">Sign In</a></p>
      </div>
    </div>
  </div>
</div>
