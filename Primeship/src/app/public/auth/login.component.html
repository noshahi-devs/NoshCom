<div class="auth-full-page">
  <div class="auth-image-panel" aria-hidden="true"></div>

  <div class="auth-form-panel">
    <div class="form-panel-inner">
      <div class="auth-form-header">
        <div class="welcome-icon"><i class="fas fa-user-circle"></i></div>
        <h2>Welcome Back</h2>
        <p>Use your email to continue</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
        <div class="field-group">
          <label><i class="fas fa-envelope"></i> Email</label>
          <input type="email" class="nosh-input" formControlName="email" placeholder="name@company.com">
          <div class="field-error" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
            <i class="fas fa-exclamation-circle"></i> Valid email required
          </div>
        </div>

        <div class="field-group">
          <label><i class="fas fa-lock"></i> Password</label>
          <div class="input-with-icon">
            <input [type]="showPassword ? 'text' : 'password'" class="nosh-input"
              formControlName="password" placeholder="••••••••">
            <button type="button" class="toggle-eye" (click)="togglePasswordVisibility()">
              <i class="fas" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
            </button>
          </div>
          <div class="field-error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            <i class="fas fa-exclamation-circle"></i> Password required
          </div>
        </div>

        <div class="form-options-row">
          <label class="checkbox-label">
            <input type="checkbox" formControlName="rememberMe"> Keep me logged in
          </label>
          <a routerLink="/auth/forgot-password" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="submit" class="nosh-btn-primary" [disabled]="loginForm.invalid || isLoading">
          <span *ngIf="!isLoading">Sign In</span>
          <i class="fas fa-spinner fa-spin" *ngIf="isLoading"></i>
          <i class="fas fa-arrow-right" *ngIf="!isLoading"></i>
        </button>
      </form>

      <div class="auth-divider"><span>New here?</span></div>
      <div class="auth-form-footer">
        <p>Don't have an account? <a routerLink="/auth/register">Create one free</a></p>
      </div>
    </div>
  </div>
</div>
