<div class="wc-global-loader" *ngIf="pageLoader.isLoading()" aria-label="Loading page">
  <div class="wc-global-loader-card">
    <div class="wc-loader-orbit">
      <span class="wc-loader-ring wc-loader-ring-1"></span>
      <span class="wc-loader-ring wc-loader-ring-2"></span>
      <span class="wc-loader-core"></span>
    </div>
    <h3>Loading World Cart</h3>
    <p>Preparing products, prices, and your personalized experience...</p>
    <div class="wc-loader-dots">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>
</div>

<ng-container *ngIf="showHeaderFooter; else plainLayout">
  <div class="app-shell" [ngClass]="{ 'header-hidden': headerHidden }">
    <div class="app-header-wrap" [ngClass]="{ 'is-hidden': headerHidden }">
      <app-header></app-header>
    </div>

    <main id="main-content" class="app-main" tabindex="-1">
      <router-outlet></router-outlet>
    </main>

    <app-footer class="app-footer"></app-footer>
  </div>
</ng-container>

<ng-template #plainLayout>
  <main id="main-content" tabindex="-1">
    <router-outlet></router-outlet>
  </main>
</ng-template>
