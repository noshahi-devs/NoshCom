<div class="customer-support sui-fade-in">
    <div class="cust-page-hdr">
        <div>
            <div class="cust-page-eyebrow">My Account</div>
            <h2 class="cust-page-title">Customer Service</h2>
        </div>
    </div>

    <section class="contact-form-card">
        <div class="form-header">
            <div>
                <h4>Contact Us</h4>
                <p class="x-small text-muted">We respond within 24 hours.</p>
            </div>
            <span class="support-pill">Customer Service</span>
        </div>

        <form class="contact-form">
            <div class="form-row">
                <label>Full Name</label>
                <input type="text" placeholder="Your name" />
            </div>
            <div class="form-row">
                <label>Email</label>
                <input type="email" placeholder="you@email.com" />
            </div>
            <div class="form-row">
                <label>Subject</label>
                <input type="text" placeholder="Order issue, payment, shipping..." />
            </div>
            <div class="form-row">
                <label>Message</label>
                <textarea rows="4" placeholder="Tell us what happened"></textarea>
            </div>
            <button type="button" class="submit-btn">Send Message</button>
        </form>
    </section>
</div>
