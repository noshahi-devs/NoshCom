<div class="cust-shell">
    <app-header></app-header>

    <div class="cust-body">
        <div *ngIf="!isSidebarCollapsed" class="cust-sidebar-backdrop d-lg-none" (click)="toggleSidebar()"></div>
        <button class="cust-menu-fab d-lg-none" (click)="toggleSidebar()" aria-label="Open sidebar">
            <i class="fa-solid fa-bars"></i>
        </button>

        <aside class="cust-sidebar" [class.show-mobile]="!isSidebarCollapsed" [style.--cust-sticky-top.px]="sidebarStickyTop">
            <nav class="cust-nav">
                <div *ngFor="let group of menuGroups" class="cust-nav-group">
                    <div class="cust-nav-group-label">{{ group.title }}</div>
                    <ng-container *ngFor="let item of group.items">
                        <a [routerLink]="item.path" routerLinkActive="active"
                            [routerLinkActiveOptions]="{exact: item.path === '/customer/orders'}" class="cust-nav-item">
                            <span class="cust-nav-icon">
                                <i class="fas {{ item.icon }}"></i>
                            </span>
                            <span class="cust-nav-label">{{ item.label }}</span>
                        </a>

                        <a *ngIf="group.title === 'Account' && item.path === '/customer/profile'" [routerLink]="['/']"
                            class="cust-shop-now-btn" (click)="isSidebarCollapsed = true">
                            <i class="fas fa-store"></i>
                            <span>Shop Now</span>
                        </a>
                    </ng-container>
                </div>
            </nav>

            <div class="cust-sidebar-footer">
                <button (click)="logout()" class="cust-sidebar-logout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <main class="cust-content">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
