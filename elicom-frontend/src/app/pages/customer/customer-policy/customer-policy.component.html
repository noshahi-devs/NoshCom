<div class="policy-container">
    <div class="policy-header">
        <h1>World Cart Us Policies</h1>
        <p>Your guide to our terms, privacy, and service standards.</p>
    </div>

    <div class="policy-grid">
        <div class="policy-card" *ngFor="let item of policies">
            <div class="policy-icon">
                <i class="fas {{ item.icon }}"></i>
            </div>
            <h3>{{ item.title }}</h3>
            <p>{{ item.description }}</p>
            <button class="btn-read">Read Full Policy</button>
        </div>
    </div>
</div>
