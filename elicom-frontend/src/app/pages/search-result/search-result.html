<div class="search-result-container">
    <div class="right-pane">
        <div class="search-top-sticky">
            <!-- Filter/Sort Row -->
            <div class="filter-row">
                <div class="filter-row-copy">
                    <h2>{{ categoryTitle || 'Browse Products' }}</h2>
                    <p>Curated picks matched to your search and ready to explore.</p>
                </div>

                <div class="filter-row-controls">
                    <div class="category-picker-wrap">
                        <button type="button" class="category-picker" (click)="toggleCategoryModal()">
                            <span class="picker-value">{{ selectedCategoryLabel || 'All Category' }}</span>
                            <i class="fas" [class.fa-chevron-down]="!showCategoryModal" [class.fa-chevron-up]="showCategoryModal"></i>
                        </button>

                        <div class="category-modal" *ngIf="showCategoryModal">
                            <div class="category-modal-head">
                                <strong>Select Category</strong>
                                <button type="button" class="category-close" (click)="closeCategoryModal()">Close</button>
                            </div>
                            <div class="category-modal-list">
                                <button type="button" class="category-option" [class.active]="!selectedCategoryLabel"
                                    (click)="selectCategory(null)">
                                    All Category
                                </button>
                                <button type="button" class="category-option" *ngFor="let category of availableCategories"
                                    [class.active]="selectedCategoryLabel === category" (click)="selectCategory(category)">
                                    {{ category }}
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="price-field-group">
                        <label class="price-field">
                            <span class="price-label">Min</span>
                            <span class="price-input-wrap">
                                <span class="currency-sign">$</span>
                                <input type="number" inputmode="numeric" min="0" step="1" [value]="minPriceInput"
                                    (input)="onPriceInput('min', $event)" placeholder="0">
                            </span>
                        </label>

                        <label class="price-field">
                            <span class="price-label">Max</span>
                            <span class="price-input-wrap">
                                <span class="currency-sign">$</span>
                                <input type="number" inputmode="numeric" min="0" step="1" [value]="maxPriceInput"
                                    [class.invalid]="isMaxPriceInvalid"
                                    (input)="onPriceInput('max', $event)" placeholder="10000">
                            </span>
                        </label>
                    </div>

                    <div class="sort-box" id="sortBox" tabindex="0" (click)="toggleSortDropdown()">
                        <div class="sort-label">Sort By</div>

                        <div class="sort-select">
                            <div class="sort-value">{{ getSortLabel(filterData.sort) }}</div>
                            <div class="arrow"></div>
                        </div>

                        <div class="dropdown" [class.show]="showSortDropdown">
                            <div class="opt" (click)="onSortChange('recommended')">Recommended</div>
                            <div class="opt" (click)="onSortChange('newest')">Newest</div>
                            <div class="opt" (click)="onSortChange('price-low')">Price: Low to High</div>
                            <div class="opt" (click)="onSortChange('price-high')">Price: High to Low</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Product Grid -->
        <div class="product-area">
            <app-product-grid-new [filterData]="filterData" (productsLoaded)="onProductsLoaded($event)">
            </app-product-grid-new>
        </div>

        <hr style="margin: 8px 0 14px; border: none; border-top: 1px solid #eee;">

        <!-- Smart Suggestions Section -->
        <div class="suggestions-area">
            <div class="suggestions-heading">
                <h3>Recommended For You</h3>
                <span></span>
            </div>
            <app-product-grid-new [filterData]="{ sort: 'recommended' }" [visibleCountOverride]="10">
            </app-product-grid-new>
        </div>

    </div>
</div>
