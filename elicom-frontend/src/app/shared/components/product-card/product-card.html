<div class="card-section">
  <div class="product-grid">
    <div
      class="product-card"
      *ngFor="let product of visibleProducts"
      (click)="goToDetail(product)"
    >
      <div class="card-shell"></div>
      <div class="card-glow"></div>

      <div class="badge-tag" [class.sale]="getBadgeLabel(product) === 'SALE'">
        {{ getBadgeLabel(product) }}
      </div>

      <div class="wishlist-btn" (click)="stopCardClick($event)">
        <i class="far fa-heart"></i>
      </div>

      <div class="product-img-box">
        <img [src]="product.image" [alt]="product.title" />

        <div class="card-actions-overlay">
          <div class="action-btn" (click)="quickView($event, product)">
            <i class="fas fa-eye"></i>
          </div>
          <div class="action-btn" (click)="stopCardClick($event)">
            <i class="fas fa-sync-alt"></i>
          </div>
        </div>
      </div>

      <div class="product-info">
        <div class="rating" *ngIf="showRating">
          <ng-container *ngFor="let star of [1, 2, 3, 4, 5]">
            <i
              class="fas fa-star"
              [class.inactive]="star > getRating(product)"
            ></i>
          </ng-container>
          <span>({{ getReviewCount(product) }} Reviews)</span>
        </div>

        <div class="product-meta-top" *ngIf="showShopName || showShipping">
          <span class="meta-chip" *ngIf="showShopName && product.storeName">
            {{ product.storeName }}
          </span>
          <span class="meta-chip muted" *ngIf="showShipping">Premium Shipping</span>
        </div>

        <h3 [title]="product.title">{{ product.title }}</h3>

        <div class="product-footer">
          <div class="price-wrap">
            <div class="price">${{ product.price }}</div>
            <span class="old-price" *ngIf="product.oldPrice">
              ${{ product.oldPrice }}
            </span>
          </div>
          <button class="add-to-cart" (click)="addToCart($event, product)">
            Add to Cart
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="view-more-wrapper" *ngIf="showViewMore">
    <button class="view-more-btn" (click)="viewMore()">
      View more <i class="fa-solid fa-angle-down"></i>
    </button>
  </div>
</div>
