<!-- Hero Slider -->
<section class="hero">
  <div
    class="slide"
    *ngFor="let slide of slides; let i = index"
    [class.active]="currentSlide === i"
  >
    <img class="slide-bg" [src]="slide.image" [alt]="slide.title" />
    <div class="slide-overlay"></div>

    <div class="slide-content">
      <h5>{{ slide.tagline }}</h5>
      <h1>{{ slide.title }}</h1>
      <p>{{ slide.description }}</p>
      <a [routerLink]="slide.link" class="btn-slide">{{ slide.cta }}</a>
    </div>
  </div>

  <button class="slider-arrow arrow-prev" type="button" (click)="prevSlide()">
    <i class="fas fa-chevron-left"></i>
  </button>
  <button class="slider-arrow arrow-next" type="button" (click)="nextSlide()">
    <i class="fas fa-chevron-right"></i>
  </button>

  <div class="slider-dots">
    <button
      type="button"
      class="dot"
      *ngFor="let slide of slides; let i = index"
      [class.active]="currentSlide === i"
      (click)="goToSlide(i)"
      [attr.aria-label]="'Go to slide ' + (i + 1)"
    ></button>
  </div>
</section>
