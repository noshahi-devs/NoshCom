<div class="section payment-container" [class]="'theme-' + selectedMethodId">
  <h2 class="section-title">Payment Method</h2>

  <!-- Premium Method Grid (Cards) -->
  <div class="method-grid-container mb-5">
    <div class="method-card" *ngFor="let method of paymentMethods"
      [class.active]="selectedMethodId === method.id"
      [style.background]="method.gradient"
      (click)="onMethodChange(method.id)">
      <div class="card-glass-glow"></div>
      <div class="method-card-content">
        <h3 class="method-card-name">{{ method.name }}</h3>
        <div class="card-logo-wrap">
          <img [src]="method.icon" [alt]="method.name">
        </div>
        <div class="status-shelf">
          <span class="status-marker">AVAILABLE</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Persistent Payment Form -->
  <div class="payment-form-area animate-fade-in">
    <div class="card-inputs">
      
      <!-- Nosh Pay Suggestion -->
      <div class="method-info mb-4" *ngIf="selectedMethodId === 'finora'">
        <i class="pi pi-info-circle me-3"></i>
        <span>{{ selectedMethod.statusMsg }}</span>
      </div>

      <div class="form-group mb-4">
        <label class="field-label">Card Number</label>
        <div class="input-wrapper" [class.error-border]="submitted && cardErrors.number">
          <i class="pi pi-credit-card"></i>
          <input type="text" placeholder="0000 0000 0000 0000" [value]="card.number"
            (input)="formatCardNumber($event)">
        </div>
        <div class="error-msg" *ngIf="submitted && cardErrors.number">
          <i class="pi pi-exclamation-circle"></i> Must be 16 digits
        </div>
      </div>

      <div class="row">
        <div class="col-6">
          <div class="form-group mb-4">
            <label class="field-label">Expiry Date</label>
            <div class="form-control" [class.error-border]="submitted && cardErrors.expiry">
              <input type="text" placeholder="MM/YY" [value]="card.expiry"
              (input)="formatExpiry($event)">
            </div>
            <div class="error-msg" *ngIf="submitted && cardErrors.expiry">
              <i class="pi pi-exclamation-circle"></i> Invalid Date
            </div>
          </div>
        </div>
        <div class="col-6">
          <div class="form-group mb-4">
            <label class="field-label">CVV</label>
            <div class="form-control" [class.error-border]="submitted && cardErrors.cvv">
              <input type="text" placeholder="123" [value]="card.cvv" (input)="formatCVV($event)">
            </div>
            <div class="error-msg" *ngIf="submitted && cardErrors.cvv">
              <i class="pi pi-exclamation-circle"></i> 3 digits
            </div>
          </div>
        </div>
      </div>

      <div class="form-group mb-4">
        <label class="field-label">Card Holder Name</label>
        <div class="form-control">
          <input type="text" placeholder="Name on card" [(ngModel)]="card.holder">
        </div>
      </div>

      <!-- Easy Finora Verification -->
      <div class="finora-check mt-3" *ngIf="selectedMethodId === 'finora'">
        <div class="alerts mb-3">
          <div class="alert alert-info d-flex align-items-center animate-fade-in" *ngIf="isVerified">
            <i class="pi pi-check-circle me-2"></i>
            <div>
              Verified! Available Balance: <strong class="text-success">${{ verifiedBalance | number:'1.2-2' }}</strong>
            </div>
          </div>

          <div class="alert alert-danger animate-fade-in" *ngIf="verificationMessage">
            <i class="pi pi-times-circle me-2"></i> {{ verificationMessage }}
          </div>

          <div class="alert alert-warning animate-fade-in" *ngIf="submitted && !isVerified && !verificationMessage">
            <i class="pi pi-exclamation-triangle me-2"></i> Please verify your card balance before continuing.
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Form fields are always visible above -->

  <div class="actions mt-4" [class.dual-actions]="selectedMethodId === 'finora'">
    <ng-container *ngIf="selectedMethodId === 'finora'; else singleAction">
      <button type="button" class="btn btn-outline-primary verify-btn" (click)="verifyFinora()" [disabled]="isVerifying">
        <span *ngIf="isVerifying"><i class="pi pi-spin pi-spinner me-2"></i> Verifying...</span>
        <span *ngIf="!isVerifying"><i class="pi pi-shield me-2"></i> Verify Card Balance</span>
      </button>

      <button class="btn btn-save-payment" (click)="saveCard()" [disabled]="!isActive || isProcessing">
        <span *ngIf="isProcessing"><i class="pi pi-spin pi-spinner me-2"></i> Confirming Order...</span>
        <span *ngIf="!isProcessing">Confirm Order</span>
      </button>
    </ng-container>
    <ng-template #singleAction>
      <button class="btn btn-save-payment" (click)="saveCard()" [disabled]="!isActive || isProcessing">
        <span *ngIf="isProcessing"><i class="pi pi-spin pi-spinner me-2"></i> Confirming Order...</span>
        <span *ngIf="!isProcessing">Confirm Order</span>
      </button>
    </ng-template>
  </div>
</div>
