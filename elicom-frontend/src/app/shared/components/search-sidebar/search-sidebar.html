<div class="sidebar-section wrapper" [class.active]="isOpen">
    <div class="searching" *ngIf="searchTerm || selectedFilters.length > 0">
        <p>
            Results for
            <span>"{{ searchTerm || (selectedFilters[0] || 'All Products') }}"</span>
        </p>
    </div>

    <aside class="sidebar" id="sidebar">
        <div class="filter-header">
            <div>
                <div class="filter-eyebrow">Refine Results</div>
                <h2>Filters</h2>
            </div>
            <span class="clear-all" *ngIf="selectedFilters.length > 0 && !loading" (click)="clearAll()">Clear all</span>
        </div>

        <div id="selectedFilters" *ngIf="!loading && selectedFilters.length > 0">
            <div class="filter-chip" *ngFor="let filter of selectedFilters">
                <span>{{ filter }}</span>
                <button type="button" class="chip-close" (click)="removeChip(filter)" aria-label="Remove filter">×</button>
            </div>
        </div>

        <div class="sidebar-skeleton" *ngIf="loading">
            <div class="skeleton-title shimmer"></div>
            <div class="skeleton-line shimmer" *ngFor="let _ of [1, 2, 3, 4, 5, 6]"></div>
            <div class="skeleton-title shimmer price-head"></div>
            <div class="skeleton-range shimmer"></div>
        </div>

        <ng-container *ngIf="!loading">
            <div class="menu-section" *ngIf="categories.length > 0" [class.collapsed]="collapsedSections['category']">
                <h3 (click)="toggleSection('category')">
                    <span>Category</span>
                    <i class="fas" [class.fa-chevron-up]="!collapsedSections['category']" [class.fa-chevron-down]="collapsedSections['category']"></i>
                </h3>
                <ul [class.collapsed]="collapsedSections['category']">
                    <li *ngFor="let cat of (showMore['category'] ? categories : categories.slice(0, 8))">
                        <label class="item-option">
                            <input type="radio" name="cat" [value]="cat" (change)="onFilterChange($event, 'radio')">
                            <span>{{ cat }}</span>
                        </label>
                    </li>
                </ul>
                <div class="view-more-toggle" (click)="toggleViewMore('category')" *ngIf="categories.length > 8">
                    {{ showMore['category'] ? 'Show less' : 'See more' }}
                </div>
            </div>

            <div class="menu-section" *ngIf="colors.length > 0" [class.collapsed]="collapsedSections['color']">
                <h3 (click)="toggleSection('color')">
                    <span>Color</span>
                    <i class="fas" [class.fa-chevron-up]="!collapsedSections['color']" [class.fa-chevron-down]="collapsedSections['color']"></i>
                </h3>
                <div class="options color-grid" [class.collapsed]="collapsedSections['color']">
                    <label class="color-item" *ngFor="let c of colors">
                        <input type="checkbox" [value]="c" (change)="onFilterChange($event, 'checkbox')">
                        <span class="dot" [style.background-color]="c.toLowerCase()"></span>
                        <span class="color-name">{{ c }}</span>
                    </label>
                </div>
            </div>

            <div class="menu-section" *ngIf="types && types.length > 0" [class.collapsed]="collapsedSections['type']">
                <h3 (click)="toggleSection('type')">
                    <span>Type</span>
                    <i class="fas" [class.fa-chevron-up]="!collapsedSections['type']" [class.fa-chevron-down]="collapsedSections['type']"></i>
                </h3>
                <ul [class.collapsed]="collapsedSections['type']">
                    <li *ngFor="let item of types">
                        <label class="item-option">
                            <input type="checkbox" [value]="item" (change)="onFilterChange($event, 'checkbox')">
                            <span>{{ item }}</span>
                        </label>
                    </li>
                </ul>
            </div>

            <div class="menu-section" *ngIf="fits && fits.length > 0" [class.collapsed]="collapsedSections['fit']">
                <h3 (click)="toggleSection('fit')">
                    <span>Fit</span>
                    <i class="fas" [class.fa-chevron-up]="!collapsedSections['fit']" [class.fa-chevron-down]="collapsedSections['fit']"></i>
                </h3>
                <ul [class.collapsed]="collapsedSections['fit']">
                    <li *ngFor="let item of fits">
                        <label class="item-option">
                            <input type="checkbox" [value]="item" (change)="onFilterChange($event, 'checkbox')">
                            <span>{{ item }}</span>
                        </label>
                    </li>
                </ul>
            </div>

            <div class="menu-section" *ngIf="lengths && lengths.length > 0" [class.collapsed]="collapsedSections['length']">
                <h3 (click)="toggleSection('length')">
                    <span>Length</span>
                    <i class="fas" [class.fa-chevron-up]="!collapsedSections['length']" [class.fa-chevron-down]="collapsedSections['length']"></i>
                </h3>
                <ul [class.collapsed]="collapsedSections['length']">
                    <li *ngFor="let item of lengths">
                        <label class="item-option">
                            <input type="checkbox" [value]="item" (change)="onFilterChange($event, 'checkbox')">
                            <span>{{ item }}</span>
                        </label>
                    </li>
                </ul>
            </div>

            <div class="menu-section" *ngIf="sizes.length > 0" [class.collapsed]="collapsedSections['size']">
                <h3 (click)="toggleSection('size')">
                    <span>Size</span>
                    <i class="fas" [class.fa-chevron-up]="!collapsedSections['size']" [class.fa-chevron-down]="collapsedSections['size']"></i>
                </h3>
                <ul class="size-list" [class.collapsed]="collapsedSections['size']">
                    <li *ngFor="let s of sizes">
                        <label class="item-option">
                            <input type="checkbox" [value]="s" (change)="onFilterChange($event, 'checkbox')">
                            <span>{{ s }}</span>
                        </label>
                    </li>
                </ul>
            </div>

            <div class="menu-section price-section">
                <h3>
                    <span>Price</span>
                </h3>
                <div class="range-slider-container">
                    <div class="range-values">
                        <span>${{ minPrice }}</span>
                        <span>${{ maxPrice }}</span>
                    </div>
                    <div class="range-slider">
                        <div class="slider-track" [style.left.%]="(minPrice / (priceLimit.max || 10000)) * 100"
                            [style.right.%]="100 - (maxPrice / (priceLimit.max || 10000)) * 100">
                        </div>
                        <input type="range" [min]="priceLimit.min" [max]="priceLimit.max" [(ngModel)]="minPrice" (input)="onPriceChange()">
                        <input type="range" [min]="priceLimit.min" [max]="priceLimit.max" [(ngModel)]="maxPrice" (input)="onPriceChange()">
                    </div>
                </div>
            </div>
        </ng-container>
    </aside>
</div>
