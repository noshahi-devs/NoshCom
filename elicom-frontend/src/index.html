<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Nosh Com</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- <link rel="shortcut icon" href="/assets/images/world-favicon.svg" type="image/x-icon"> -->
  <link href="https://fonts.googleapis.com/css2?family=Rubik+Wet+Paint&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/primeicons@6.0.1/primeicons.css" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>
  <div id="app-loader" aria-label="Loading">
    <div class="app-loader-card">
      <div class="app-loader-orbit">
        <span class="app-loader-ring app-loader-ring-1"></span>
        <span class="app-loader-ring app-loader-ring-2"></span>
        <img src="/assets/images/world-favicon.svg" alt="World Cart Logo" class="app-loader-center-logo">
      </div>
      <h3>Loading World Cart Us</h3>
      <p>Preparing products, prices, and your personalized experience...</p>
      <div class="app-loader-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>
  <app-root></app-root>
  <style>
    #app-loader {
      position: fixed;
      inset: 0;
      background: #f8fafc;
      display: grid;
      place-items: center;
      z-index: 9999;
      backdrop-filter: blur(4px);
      background:
        radial-gradient(circle at 20% 20%, rgba(79, 70, 229, 0.12), transparent 42%),
        radial-gradient(circle at 80% 0%, rgba(56, 189, 248, 0.12), transparent 40%),
        rgba(248, 250, 252, 0.92);
    }

    .app-loader-card {
      width: min(92vw, 560px);
      border-radius: 24px;
      background: linear-gradient(155deg, #ffffff 0%, #f6f9ff 100%);
      border: 1px solid #dbe4ff;
      box-shadow:
        0 10px 24px rgba(15, 23, 42, 0.1),
        0 26px 52px rgba(15, 23, 42, 0.08);
      padding: 34px 28px 30px;
      text-align: center;
    }

    .app-loader-card h3 {
      margin: 15px 0 8px;
      font-size: clamp(28px, 2.3vw, 38px);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: 0.2px;
      background: linear-gradient(90deg, #1d4ed8, #4338ca);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }



    .app-loader-card p {
      margin: 0;
      color: #334155;
      font-size: 16px;
      font-weight: 600;
    }

    .app-loader-orbit {
      width: 112px;
      height: 112px;
      margin: 0 auto;
      position: relative;
      display: grid;
      place-items: center;
    }

    .app-loader-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 5px solid transparent;
    }

    .app-loader-ring-1 {
      border-top-color: #4f46e5;
      border-right-color: #4f46e5;
      animation: app-spin 1.05s linear infinite;
    }

    .app-loader-ring-2 {
      inset: 12px;
      border-left-color: #0ea5e9;
      border-bottom-color: #0ea5e9;
      animation: app-spin-reverse 1.3s linear infinite;
    }

    .app-loader-center-logo {
      height: 50px;
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 0 15px rgba(79, 70, 229, 0.2));
      position: relative;
      z-index: 10;
      animation: app-pulse 1.4s ease-in-out infinite;
    }

    .app-loader-dots {
      margin-top: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .app-loader-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4f46e5;
      animation: app-dot 1.1s ease-in-out infinite;
    }

    .app-loader-dots span:nth-child(2) {
      animation-delay: 0.16s;
    }

    .app-loader-dots span:nth-child(3) {
      animation-delay: 0.32s;
    }

    @keyframes app-spin {
      to { transform: rotate(360deg); }
    }

    @keyframes app-spin-reverse {
      to { transform: rotate(-360deg); }
    }

    @keyframes app-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.18); }
    }

    @keyframes app-dot {
      0%, 100% {
        transform: translateY(0);
        opacity: 0.45;
      }
      50% {
        transform: translateY(-5px);
        opacity: 1;
      }
    }
  </style>
</body>

</html>
