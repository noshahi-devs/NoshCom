<!doctype html>
<html lang="en">

<head>
  <script type="module" src="/@vite/client"></script>

  <meta charset="utf-8">
  <title>Nosh Com</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/assets/images/logo1.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Rubik+Wet+Paint&amp;display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/primeicons@6.0.1/primeicons.css" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="styles.css"></head>

<body>
  <div id="app-loader" aria-label="Loading">
    <div class="app-loader-card">
      <div class="app-loader-badge">NoshCom</div>
      <div class="app-loader-orbit" aria-hidden="true">
        <span class="app-loader-ring app-loader-ring-1"></span>
        <span class="app-loader-ring app-loader-ring-2"></span>
        <span class="app-loader-center-logo">N</span>
      </div>
      <h3>Loading NoshCom</h3>
      <p>Preparing your products, prices, and personalized experience...</p>
      <div class="app-loader-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>
  <app-root></app-root>
  <style>
    #app-loader {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 9999;
      backdrop-filter: blur(6px);
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 193, 7, 0.16), transparent 42%),
        radial-gradient(circle at 80% 0%, rgba(17, 17, 17, 0.08), transparent 40%),
        rgba(255, 255, 255, 0.92);
    }

    .app-loader-card {
      width: min(92vw, 560px);
      border-radius: 28px;
      background:
        radial-gradient(circle at top right, rgba(255, 193, 7, 0.22), transparent 32%),
        linear-gradient(180deg, #ffffff 0%, #fffdf6 100%);
      border: 1px solid rgba(17, 17, 17, 0.08);
      box-shadow:
        0 14px 28px rgba(17, 17, 17, 0.08),
        0 26px 52px rgba(17, 17, 17, 0.12);
      padding: 34px 28px 30px;
      text-align: center;
    }

    .app-loader-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 14px;
      border-radius: 999px;
      background: #111111;
      color: #ffc107;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .app-loader-card h3 {
      margin: 15px 0 8px;
      font-size: clamp(28px, 2.3vw, 38px);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: #111111;
    }

    .app-loader-card p {
      margin: 0;
      color: #3f3f3f;
      font-size: 16px;
      font-weight: 600;
    }

    .app-loader-orbit {
      width: 112px;
      height: 112px;
      margin: 18px auto 0;
      position: relative;
      display: grid;
      place-items: center;
    }

    .app-loader-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 5px solid transparent;
    }

    .app-loader-ring-1 {
      border-top-color: #111111;
      border-right-color: #ffc107;
      animation: app-spin 1.05s linear infinite;
    }

    .app-loader-ring-2 {
      inset: 12px;
      border-left-color: #111111;
      border-bottom-color: #ffc107;
      animation: app-spin-reverse 1.3s linear infinite;
    }

    .app-loader-center-logo {
      width: 56px;
      height: 56px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: linear-gradient(135deg, #111111 0%, #282828 100%);
      color: #ffc107;
      font-size: 27px;
      font-weight: 900;
      box-shadow:
        0 16px 28px rgba(17, 17, 17, 0.2),
        inset 0 0 0 1px rgba(255, 193, 7, 0.22);
      position: relative;
      z-index: 10;
      animation: app-pulse 1.4s ease-in-out infinite;
    }

    .app-loader-dots {
      margin-top: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .app-loader-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffc107;
      animation: app-dot 1.1s ease-in-out infinite;
    }

    .app-loader-dots span:nth-child(2) {
      animation-delay: 0.16s;
    }

    .app-loader-dots span:nth-child(3) {
      animation-delay: 0.32s;
    }

    @keyframes app-spin {
      to { transform: rotate(360deg); }
    }

    @keyframes app-spin-reverse {
      to { transform: rotate(-360deg); }
    }

    @keyframes app-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.18); }
    }

    @keyframes app-dot {
      0%, 100% {
        transform: translateY(0);
        opacity: 0.45;
      }
      50% {
        transform: translateY(-5px);
        opacity: 1;
      }
    }
  </style>
<script src="scripts.js" defer></script><script src="main.js" type="module"></script></body>

</html>
