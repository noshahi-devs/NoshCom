<div class="page-container">
    <div class="page-header">
        <h1>Transfer Money</h1>
        <p class="subtitle">Send money to other Easy Finora users</p>
    </div>

    <div class="transfer-form-3d">
        <div class="form-section">
            <label>Sender Wallet ID</label>
            <div class="input-with-validation">
                <input type="text" [(ngModel)]="sender" (input)="validateSender()"
                    placeholder="Your Wallet ID" class="input-3d" [disabled]="isLoadingWallet" />
                <span *ngIf="senderValid && !isLoadingWallet" class="validation-icon">OK</span>
                <span *ngIf="isLoadingWallet" class="mini-loader-inline"></span>
            </div>
            <p class="field-hint loading" *ngIf="isLoadingWallet">Loading your wallet ID...</p>
            <p class="field-hint" *ngIf="!senderValid && sender.length > 0 && !isLoadingWallet">Must match your wallet ID</p>
            <p class="field-hint recipient-name" *ngIf="senderBalance !== null">Balance: {{ senderBalance | number:'1.2-2' }} USD</p>
        </div>

        <div class="form-section">
            <label>Recipient Wallet ID</label>
            <div class="input-with-validation">
                <input type="text" [(ngModel)]="recipient" (input)="validateRecipient()"
                    placeholder="Enter recipient wallet ID" class="input-3d" />
                <button class="btn-verify" (click)="verifyRecipient()" [disabled]="!recipient.trim() || isVerifyingRecipient">
                    Verify
                </button>
                <span *ngIf="isVerifyingRecipient" class="mini-loader-inline"></span>
            </div>
            <p class="field-hint recipient-name" *ngIf="recipientName">Recipient: <strong>{{ recipientName }}</strong></p>
        </div>

        <div class="form-section">
            <label>Amount (USD)</label>
            <input type="number" [(ngModel)]="amount" placeholder="0.00" class="input-3d" min="0" step="0.01" />
            <p class="fee-info">Transfer Fee: <strong>Free</strong></p>
        </div>

        <div class="form-section">
            <label>Description (Optional)</label>
            <textarea [(ngModel)]="description" placeholder="Purpose of transfer..." class="input-3d"
                rows="3"></textarea>
        </div>

        <button class="btn-3d btn-submit" (click)="submitTransfer()"
            [disabled]="!senderValid || !recipient.trim() || !amount || amount <= 0 || isLoading"
            [class.btn-loading]="isLoading">
            <span *ngIf="!isLoading">Transfer {{ amount || 0 | number:'1.2-2' }} USD</span>
            <span *ngIf="isLoading" class="btn-spinner"></span>
        </button>
    </div>
</div>
